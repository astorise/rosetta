name: Build and Deploy Rust Workers

on:
  push:
    branches:
      - main
    paths:
      - 'rust-workers/**'
      - '.github/workflows/deploy.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  GAR_LOCATION: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers
  SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: '${{ env.PROJECT_ID }}'
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ env.SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: '${{ env.PROJECT_ID }}'

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push worker-pdf
        working-directory: ./rust-workers
        run: |
          docker build -f Dockerfile.pdf -t ${{ env.GAR_LOCATION }}/worker-pdf:${{ github.sha }} .
          docker push ${{ env.GAR_LOCATION }}/worker-pdf:${{ github.sha }}

      - name: Build and Push worker-html
        working-directory: ./rust-workers
        run: |
          docker build -f Dockerfile.html -t ${{ env.GAR_LOCATION }}/worker-html:${{ github.sha }} .
          docker push ${{ env.GAR_LOCATION }}/worker-html:${{ github.sha }}

      - name: Build and Push worker-jar
        working-directory: ./rust-workers
        run: |
          docker build -f Dockerfile.jar -t ${{ env.GAR_LOCATION }}/worker-jar:${{ github.sha }} .
          docker push ${{ env.GAR_LOCATION }}/worker-jar:${{ github.sha }}

      - name: Deploy worker-pdf to Cloud Run
        run: |
          gcloud run deploy worker-pdf \
            --image ${{ env.GAR_LOCATION }}/worker-pdf:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --no-allow-unauthenticated

      - name: Deploy worker-html to Cloud Run
        run: |
          gcloud run deploy worker-html \
            --image ${{ env.GAR_LOCATION }}/worker-html:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --no-allow-unauthenticated

      - name: Deploy worker-jar to Cloud Run
        run: |
          gcloud run deploy worker-jar \
            --image ${{ env.GAR_LOCATION }}/worker-jar:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --service-account ${{ env.SERVICE_ACCOUNT }} \
            --no-allow-unauthenticated

      - name: Ensure Eventarc Triggers
        shell: bash
        run: |
          ensure_trigger() {
            local trigger_name="$1"
            local service_name="$2"

            if gcloud eventarc triggers describe "$trigger_name" --location="${{ env.REGION }}" >/dev/null 2>&1; then
              echo "Trigger $trigger_name already exists; leaving it unchanged."
              return 0
            fi

            gcloud eventarc triggers create "$trigger_name" \
              --location="${{ env.REGION }}" \
              --destination-run-service="$service_name" \
              --destination-run-region="${{ env.REGION }}" \
              --event-filters="type=google.cloud.storage.object.v1.finalized" \
              --event-filters="bucket=raw-docs-bucket" \
              --event-data-content-type="application/json" \
              --service-account="${{ env.SERVICE_ACCOUNT }}"
          }

          # Cloud Storage direct events only support exact-match filters.
          # Each worker ignores unsupported extensions in application code.
          ensure_trigger trigger-worker-pdf worker-pdf
          ensure_trigger trigger-worker-html worker-html
          ensure_trigger trigger-worker-jar worker-jar
