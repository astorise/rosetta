name: Deploy to Firebase

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'rust-workers/**'
      - '.github/workflows/**'
      - '*.rules'
      - 'firebase.json'

jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build Frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
        run: npm run build
        working-directory: ./frontend

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase
        env:
          GOOGLE_CLOUD_QUOTA_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: npx firebase-tools deploy --project ${{ secrets.GCP_PROJECT_ID }}

  deploy-rust-workers:
    needs: deploy
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push worker-auth
        run: |-
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers/worker-auth:latest -f Dockerfile.auth .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers/worker-auth:latest
        working-directory: ./rust-workers

      - name: Deploy worker-auth to Cloud Run
        run: |-
          gcloud run deploy worker-auth \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers/worker-auth:latest \
            --region us-central1 \
            --platform managed \
            --no-allow-unauthenticated \
            --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" \
            --set-env-vars "EMAIL_API_KEY=${{ secrets.EMAIL_API_KEY }}" \
            --set-env-vars "EMAIL_API_URL=${{ secrets.EMAIL_API_URL }}"

      - name: Create Eventarc Trigger for worker-auth
        run: |-
          gcloud eventarc triggers create rosetta-auth-trigger \
            --location=us-central1 \
            --destination-run-service=worker-auth \
            --destination-run-region=us-central1 \
            --event-filters="type=google.firebase.auth.user.v1.created" \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}
        continue-on-error: true # Fails if trigger already exists, which is ok
