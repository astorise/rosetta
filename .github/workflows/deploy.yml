name: Deploy to Firebase

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'rust-workers/**'
      - 'functions/**'
      - '.github/workflows/**'
      - '*.rules'
      - 'firebase.json'

jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build Frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
        run: npm run build
        working-directory: ./frontend

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase
        env:
          GOOGLE_CLOUD_QUOTA_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: npx firebase-tools deploy --project ${{ secrets.GCP_PROJECT_ID }} --except functions

  deploy-rust-workers:
    needs: deploy
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.get_service_url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Rust tests
        run: cargo test --workspace
        working-directory: ./rust-workers

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: '>= 363.0.0'

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push worker-auth
        run: |-
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers/worker-auth:latest -f Dockerfile.auth .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers/worker-auth:latest
        working-directory: ./rust-workers

      - name: Deploy worker-auth to Cloud Run
        id: deploy_worker
        run: |-
          gcloud run deploy worker-auth \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers/worker-auth:latest \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region us-central1 \
            --platform managed \
            --no-allow-unauthenticated \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" \
            --set-env-vars "EMAIL_API_KEY=${{ secrets.EMAIL_API_KEY }}" \
            --set-env-vars "EMAIL_API_URL=${{ secrets.EMAIL_API_URL }}" \
            --quiet
      
      - name: Get Cloud Run service URL
        id: get_service_url
        run: echo "url=$(gcloud run services describe worker-auth --platform managed --region us-central1 --format 'value(status.url)')" >> $GITHUB_OUTPUT

      - name: Build and Push document workers
        run: |-
          for worker in worker-pdf worker-html worker-jar; do
            case "$worker" in
              worker-pdf) dockerfile="Dockerfile.pdf" ;;
              worker-html) dockerfile="Dockerfile.html" ;;
              worker-jar) dockerfile="Dockerfile.jar" ;;
            esac

            docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers/${worker}:latest -f "${dockerfile}" .
            docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers/${worker}:latest
          done
        working-directory: ./rust-workers

      - name: Deploy document workers to Cloud Run
        run: |-
          # The service account used here MUST have the `roles/storage.objectAdmin` role
          # to allow the workers to write to the LanceDB dataset in the GCS bucket.
          gcloud run deploy worker-pdf \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers/worker-pdf:latest \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region us-central1 \
            --platform managed \
            --no-allow-unauthenticated \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --set-env-vars "PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars "MD_BUCKET=${{ secrets.GCP_PROJECT_ID }}-rag-markdown" \
            --set-env-vars "VERTEX_LOCATION=us-central1" \
            --set-env-vars "GEMINI_MODEL=gemini-2.5-flash" \
            --quiet

          gcloud run deploy worker-html \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers/worker-html:latest \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region us-central1 \
            --platform managed \
            --no-allow-unauthenticated \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --set-env-vars "PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars "MD_BUCKET=${{ secrets.GCP_PROJECT_ID }}-rag-markdown" \
            --quiet

          gcloud run deploy worker-jar \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rag-workers/worker-jar:latest \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region us-central1 \
            --platform managed \
            --no-allow-unauthenticated \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --set-env-vars "PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars "MD_BUCKET=${{ secrets.GCP_PROJECT_ID }}-rag-markdown" \
            --quiet

  deploy-functions:
    needs: deploy-rust-workers
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      
      - name: Install Dependencies
        run: npm ci
        working-directory: ./functions

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Write Functions runtime env
        working-directory: ./functions
        run: |
          cat <<EOF > .env.${{ secrets.GCP_PROJECT_ID }}
          CLOUD_RUN_SERVICE_URL=${{ needs.deploy-rust-workers.outputs.service_url }}
          EOF

      - name: Deploy to Firebase Functions
        env:
          GOOGLE_CLOUD_QUOTA_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: npx firebase-tools deploy --only functions --project ${{ secrets.GCP_PROJECT_ID }} --force
